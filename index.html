<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Denis Health</title>
  <meta name="theme-color" content="#3b82f6" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Denis Health" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <style>
    :root{
      --bg:#f4f9ff;
      --bg2:#eef6ff;
      --card:#ffffff;
      --text:#16314f;
      --muted:#6b85a6;
      --primary:#4f9cff;
      --primary-dark:#2d7eea;
      --primary-soft:#e6f1ff;
      --line:#d9e8fb;
      --danger:#d94a4a;
      --good:#1f9d63;
      --shadow:0 10px 28px rgba(45,126,234,.10);
      --radius:22px;
      --radius-sm:16px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color:var(--text);
      background:linear-gradient(180deg,var(--bg),var(--bg2));
      min-height:100vh;
    }
    .app{
      max-width:760px;
      margin:0 auto;
      padding:18px 14px 90px;
    }
    .hero{
      background:linear-gradient(135deg,#68adff,#4f9cff 60%, #2d7eea);
      color:white;
      border-radius:28px;
      padding:18px;
      box-shadow:var(--shadow);
      position:relative;
      overflow:hidden;
    }
    .hero::before,.hero::after{
      content:"";
      position:absolute;
      border-radius:50%;
      background:rgba(255,255,255,.14);
      pointer-events:none;
    }
    .hero::before{width:170px;height:170px;right:-50px;top:-60px}
    .hero::after{width:120px;height:120px;right:40px;bottom:-55px}
    h1{margin:0;font-size:30px;line-height:1.05}
    .sub{margin-top:10px;font-size:14px;line-height:1.45;color:rgba(255,255,255,.92)}
    .topbar{
      display:flex;gap:8px;flex-wrap:wrap;justify-content:space-between;align-items:center;margin-top:16px;
      position:relative;z-index:2;
    }
    .btn,.seg button,.mini-btn{
      border:none;cursor:pointer;font:inherit;
    }
    .seg{
      display:inline-flex;
      background:rgba(255,255,255,.18);
      padding:4px;border-radius:999px;backdrop-filter:blur(8px);
    }
    .seg button{
      padding:10px 14px;border-radius:999px;background:transparent;color:white;font-weight:700;
    }
    .seg button.active{background:white;color:var(--primary-dark)}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap}
    .mini-btn{
      padding:10px 12px;border-radius:14px;background:rgba(255,255,255,.18);color:white;font-size:13px;font-weight:700;
      backdrop-filter:blur(8px);
    }

    .stats{
      display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:14px;
    }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }
    .stat{padding:14px}
    .label{font-size:12px;color:var(--muted);margin-bottom:8px}
    .value{font-size:26px;font-weight:800;letter-spacing:-.02em}
    .hint{font-size:12px;color:var(--muted);margin-top:6px}

    .tabs{
      display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-top:16px;
    }
    .tab{
      background:white;border:1px solid var(--line);border-radius:18px;padding:12px 10px;text-align:center;font-weight:700;color:var(--text);
      box-shadow:var(--shadow); font-size:13px;
    }
    .tab.active{background:var(--primary);color:white;border-color:var(--primary)}
    .analyst-tabs{
      display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-top:12px;
    }

    .section{padding:16px;margin-top:14px}
    .section h2{margin:0 0 6px;font-size:24px;line-height:1.08}
    .section p.desc{margin:0 0 14px;color:var(--muted);font-size:14px;line-height:1.45}

    .form-grid{display:grid;grid-template-columns:1fr;gap:10px}
    .field{display:flex;flex-direction:column;gap:6px}
    .field label{font-size:13px;color:var(--muted);font-weight:700}
    input,select,textarea{
      width:100%;border:1px solid var(--line);background:#fff;border-radius:16px;padding:12px 14px;font:inherit;color:var(--text);outline:none;
    }
    input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(79,156,255,.12)}
    textarea{min-height:90px;resize:vertical}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
    .primary{
      background:var(--primary);color:white;padding:12px 16px;border-radius:16px;font-weight:800;
    }
    .secondary{
      background:white;color:var(--text);padding:12px 16px;border-radius:16px;border:1px solid var(--line);font-weight:800;
    }
    .danger{
      background:#fff5f5;color:var(--danger);border:1px solid #ffd4d4;padding:10px 14px;border-radius:14px;font-weight:700;
    }
    .list{display:flex;flex-direction:column;gap:10px;margin-top:14px}
    .entry{
      border:1px solid var(--line);border-radius:18px;padding:12px;background:#fbfdff;
    }
    .entry-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
    .entry-title{font-weight:800;font-size:16px}
    .entry-meta{font-size:12px;color:var(--muted);margin-top:4px}
    .entry-note{margin-top:8px;font-size:13px;color:var(--text);line-height:1.4}
    .empty{
      padding:18px;border:1px dashed var(--line);border-radius:18px;background:#fafcff;color:var(--muted);text-align:center;
    }
    .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .chip{
      background:var(--primary-soft);color:var(--primary-dark);padding:7px 10px;border-radius:999px;font-size:12px;font-weight:700;
    }
    .status{
      padding:12px 14px;border-radius:16px;background:#f9fbff;border:1px solid var(--line);font-size:13px;color:var(--muted);
      line-height:1.4;
    }
    .success{color:var(--good)}
    .warning{color:#bd7d00}
    .footer-space{height:8px}


    .report-day{border:1px solid var(--line);border-radius:18px;padding:12px;background:#fbfdff;margin-top:10px}
    .report-day h3{margin:0 0 10px;font-size:18px}
    .report-grid{display:grid;grid-template-columns:1fr;gap:8px}
    .report-block{background:white;border:1px solid var(--line);border-radius:14px;padding:10px}
    .report-block b{display:block;margin-bottom:4px}
    .report-small{font-size:13px;color:var(--muted);line-height:1.45}
    .flag{color:#b45309;font-weight:800}
    .bad{color:var(--danger);font-weight:800}
    @media (min-width:700px){.report-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}

    @media (min-width:700px){
      .stats{grid-template-columns:repeat(4,minmax(0,1fr))}
      .tabs{grid-template-columns:repeat(4,minmax(0,1fr))}
      .analyst-tabs{grid-template-columns:repeat(4,minmax(0,1fr))}
      .form-grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="hero">
      <h1>Denis Health</h1>
      <div class="sub">Новая мобильная версия: проще, стабильнее и удобнее. Голубая спокойная палитра вместо зелёной. У Дениса — быстрый ввод, у тебя — синхронизация и обзор.</div>
      <div class="topbar">
        <div class="seg">
          <button data-mode="denis" class="active" type="button">Режим Дениса</button>
          <button data-mode="analyst" type="button">Твой режим</button>
        </div>
        <div class="toolbar">
          <button id="installBtn" class="mini-btn" style="display:none" type="button">Установить</button>
          <button id="exportBtn" class="mini-btn" type="button">Экспорт</button>
          <button id="importBtn" class="mini-btn" type="button">Импорт</button>
          <button id="resetBtn" class="mini-btn" type="button">Сброс</button>
          <input id="importFile" type="file" accept="application/json" hidden>
        </div>
      </div>
    </div>

    <div class="stats">
      <div class="card stat">
        <div class="label">Среднее давление</div>
        <div class="value" id="avgPressure">—</div>
        <div class="hint">по внесённым записям</div>
      </div>
      <div class="card stat">
        <div class="label">Ккал сегодня</div>
        <div class="value" id="todayCalories">—</div>
        <div class="hint">по еде за сегодня</div>
      </div>
      <div class="card stat">
        <div class="label">Вес</div>
        <div class="value" id="weightStat">—</div>
        <div class="hint">из профиля</div>
      </div>
      <div class="card stat">
        <div class="label">Синхронизация</div>
        <div class="value" id="syncStat">Локально</div>
        <div class="hint" id="syncHint">ещё не настроена</div>
      </div>
    </div>

    <div id="navArea"></div>
    <div id="screenArea"></div>
    <div class="footer-space"></div>
  </div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const DATA_KEY = 'denis-health-mobile-v2-data';
const CFG_KEY = 'denis-health-mobile-v2-config';

const today = () => new Date().toISOString().slice(0,10);
const nowTime = () => new Date().toTimeString().slice(0,5);
const uid = () => Math.random().toString(36).slice(2) + Date.now().toString(36);

const defaultData = {
  mode:'denis',
  denisScreen:'pressure',
  analystScreen:'sync',
  profile:{name:'Денис', birthYear:'1971', height:'', weight:'', waist:'', notes:''},
  pressure:[],
  sleep:[],
  meals:[],
  symptoms:[]
};

const defaultCfg = {
  url:'',
  anonKey:'',
  roomCode:'',
  email:''
};

let state = load(DATA_KEY, defaultData);
let cfg = load(CFG_KEY, defaultCfg);
let supabase = null;
let sessionEmail = '';
let syncMessage = 'Сначала вставь Supabase URL, anon key, room code и email.';

function load(key, fallback){
  try{
    const raw = localStorage.getItem(key);
    return raw ? JSON.parse(raw) : structuredClone(fallback);
  }catch(e){
    return structuredClone(fallback);
  }
}
function saveAll(){
  localStorage.setItem(DATA_KEY, JSON.stringify(state));
  localStorage.setItem(CFG_KEY, JSON.stringify(cfg));
}
function setState(mutator){
  state = typeof mutator === 'function' ? mutator(structuredClone(state)) : mutator;
  saveAll();
  render();
}
function setCfg(mutator){
  cfg = typeof mutator === 'function' ? mutator(structuredClone(cfg)) : mutator;
  saveAll();
  render();
}
function ensureClient(){
  if(!cfg.url || !cfg.anonKey) return null;
  if(!supabase) supabase = createClient(cfg.url, cfg.anonKey);
  return supabase;
}
async function refreshSession(){
  const client = ensureClient();
  if(!client){
    sessionEmail = '';
    render();
    return;
  }
  const { data } = await client.auth.getSession();
  sessionEmail = data.session?.user?.email || '';
  render();
}
function calcMealCalories(item){
  const direct = Number(item.calories || 0);
  if(direct) return direct;
  return Number(item.protein||0)*4 + Number(item.fat||0)*9 + Number(item.carbs||0)*4;
}
function getStats(){
  const p = state.pressure;
  const avg = p.length ? {
    sys: Math.round(p.reduce((s,x)=>s+Number(x.sys||0),0)/p.length),
    dia: Math.round(p.reduce((s,x)=>s+Number(x.dia||0),0)/p.length)
  } : null;
  const mealsToday = state.meals.filter(x => x.date === today());
  const kcal = mealsToday.reduce((s,x)=>s+calcMealCalories(x),0);
  return {
    avg,
    kcal
  };
}
function escapeHtml(s=''){
  return String(s)
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;');
}
function currentScreen(){
  return state.mode === 'denis' ? state.denisScreen : state.analystScreen;
}
function syncStateLabel(){
  if(sessionEmail) return 'Онлайн';
  if(cfg.url && cfg.anonKey) return 'Ключи';
  return 'Локально';
}
function render(){
  document.querySelectorAll('[data-mode]').forEach(btn=>{
    btn.classList.toggle('active', btn.dataset.mode === state.mode);
  });

  const stats = getStats();
  document.getElementById('avgPressure').textContent = stats.avg ? `${stats.avg.sys}/${stats.avg.dia}` : '—';
  document.getElementById('todayCalories').textContent = stats.kcal ? String(stats.kcal) : '—';
  document.getElementById('weightStat').textContent = state.profile.weight ? `${state.profile.weight} кг` : '—';
  document.getElementById('syncStat').textContent = syncStateLabel();
  document.getElementById('syncHint').textContent = sessionEmail ? sessionEmail : (cfg.url ? 'ключи сохранены' : 'ещё не настроена');

  document.getElementById('navArea').innerHTML = state.mode === 'denis' ? renderDenisTabs() : renderAnalystTabs();
  document.getElementById('screenArea').innerHTML = renderScreen();
  wireDynamic();
}
function renderDenisTabs(){
  const tabs = [
    ['pressure','Давление'],
    ['sleep','Сон'],
    ['meals','Еда'],
    ['symptoms','Самочувствие'],
  ];
  return `<div class="tabs">
    ${tabs.map(([id,label])=>`<button type="button" class="tab ${state.denisScreen===id?'active':''}" data-screen="${id}">${label}</button>`).join('')}
  </div>`;
}
function renderAnalystTabs(){
  const tabs = [
    ['sync','Синхронизация'],
    ['dashboard','Обзор'],
    ['report','Отчёт'],
    ['profile','Профиль'],
  ];
  return `<div class="analyst-tabs">
    ${tabs.map(([id,label])=>`<button type="button" class="tab ${state.analystScreen===id?'active':''}" data-screen="${id}">${label}</button>`).join('')}
  </div>`;
}
function renderScreen(){
  const scr = currentScreen();
  if(scr === 'pressure') return renderPressure();
  if(scr === 'sleep') return renderSleep();
  if(scr === 'meals') return renderMeals();
  if(scr === 'symptoms') return renderSymptoms();
  if(scr === 'sync') return renderSync();
  if(scr === 'dashboard') return renderDashboard();
  if(scr === 'report') return renderReport();
  if(scr === 'profile') return renderProfile();
  return renderPressure();
}
function renderPressure(){
  const rows = [...state.pressure].sort((a,b)=>(b.date+b.time).localeCompare(a.date+a.time));
  return `<section class="card section">
    <h2>Давление</h2>
    <p class="desc">Самый важный экран для повседневного ввода. Всё максимально прямо и без путаницы.</p>
    <form id="pressureForm" class="form-grid two">
      <div class="field"><label>Дата</label><input type="date" name="date" value="${today()}"></div>
      <div class="field"><label>Время</label><input type="time" name="time" value="${nowTime()}"></div>
      <div class="field"><label>Верхнее</label><input name="sys" placeholder="например 145"></div>
      <div class="field"><label>Нижнее</label><input name="dia" placeholder="например 92"></div>
      <div class="field"><label>Пульс</label><input name="pulse" placeholder="например 78"></div>
      <div class="field"><label>Лекарства</label><input name="meds" placeholder="что принял"></div>
      <div class="field" style="grid-column:1/-1"><label>Комментарий</label><textarea name="notes" placeholder="как себя чувствовал"></textarea></div>
      <div class="actions"><button class="primary" type="submit">Сохранить давление</button></div>
    </form>
    <div class="list">
      ${rows.length ? rows.map(r=>`<div class="entry">
        <div class="entry-head">
          <div>
            <div class="entry-title">${escapeHtml(r.sys||'—')}/${escapeHtml(r.dia||'—')} · пульс ${escapeHtml(r.pulse||'—')}</div>
            <div class="entry-meta">${escapeHtml(r.date||'')} ${escapeHtml(r.time||'')}</div>
          </div>
          <button type="button" class="danger" data-delete="pressure:${r.id}">Удалить</button>
        </div>
        ${(r.notes||r.meds)?`<div class="entry-note">${escapeHtml(r.meds ? 'Лекарства: ' + r.meds + '. ' : '')}${escapeHtml(r.notes||'')}</div>`:''}
      </div>`).join('') : '<div class="empty">Пока нет записей давления.</div>'}
    </div>
  </section>`;
}
function renderSleep(){
  const rows = [...state.sleep].sort((a,b)=>b.date.localeCompare(a.date));
  return `<section class="card section">
    <h2>Сон</h2>
    <p class="desc">Сюда можно быстро заносить сон, храп и дневную сонливость.</p>
    <form id="sleepForm" class="form-grid two">
      <div class="field"><label>Дата</label><input type="date" name="date" value="${today()}"></div>
      <div class="field"><label>Сонливость 0–10</label><input name="daySleepiness" placeholder="например 7"></div>
      <div class="field"><label>Лёг спать</label><input type="time" name="bedTime" value="22:30"></div>
      <div class="field"><label>Проснулся</label><input type="time" name="wakeTime" value="07:00"></div>
      <div class="field"><label>Храп</label><select name="snoring"><option>не знаю</option><option>нет</option><option>да</option><option>сильно</option></select></div>
      <div class="field"><label>Сухость во рту</label><select name="dryMouth"><option>нет</option><option>да</option></select></div>
      <div class="field" style="grid-column:1/-1"><label>Комментарий</label><textarea name="notes"></textarea></div>
      <div class="actions"><button class="primary" type="submit">Сохранить сон</button></div>
    </form>
    <div class="list">
      ${rows.length ? rows.map(r=>`<div class="entry">
        <div class="entry-head">
          <div>
            <div class="entry-title">${escapeHtml(r.date||'')} · ${escapeHtml(r.bedTime||'—')} → ${escapeHtml(r.wakeTime||'—')}</div>
            <div class="entry-meta">Сонливость ${escapeHtml(r.daySleepiness||'—')}/10 · Храп: ${escapeHtml(r.snoring||'—')}</div>
          </div>
          <button type="button" class="danger" data-delete="sleep:${r.id}">Удалить</button>
        </div>
        ${r.notes?`<div class="entry-note">${escapeHtml(r.notes)}</div>`:''}
      </div>`).join('') : '<div class="empty">Пока нет записей сна.</div>'}
    </div>
  </section>`;
}
function renderMeals(){
  const rows = [...state.meals].sort((a,b)=>b.date.localeCompare(a.date));
  return `<section class="card section">
    <h2>Еда</h2>
    <p class="desc">Калории считаются автоматически по БЖУ, если ты не ввёл их вручную.</p>
    <form id="mealForm" class="form-grid two">
      <div class="field"><label>Дата</label><input type="date" name="date" value="${today()}"></div>
      <div class="field"><label>Приём пищи</label><select name="meal"><option>Завтрак</option><option>Обед</option><option>Ужин</option><option>Перекус</option></select></div>
      <div class="field"><label>Продукт / блюдо</label><input name="product"></div>
      <div class="field"><label>Вес, г</label><input name="grams"></div>
      <div class="field"><label>Белки</label><input name="protein"></div>
      <div class="field"><label>Жиры</label><input name="fat"></div>
      <div class="field"><label>Углеводы</label><input name="carbs"></div>
      <div class="field"><label>Калории</label><input name="calories" placeholder="можно оставить пустым"></div>
      <div class="field" style="grid-column:1/-1"><label>Комментарий</label><textarea name="notes"></textarea></div>
      <div class="actions"><button class="primary" type="submit">Сохранить еду</button></div>
    </form>
    <div class="list">
      ${rows.length ? rows.map(r=>`<div class="entry">
        <div class="entry-head">
          <div>
            <div class="entry-title">${escapeHtml(r.product||'Без названия')} · ${calcMealCalories(r)} ккал</div>
            <div class="entry-meta">${escapeHtml(r.date||'')} · ${escapeHtml(r.meal||'')}</div>
          </div>
          <button type="button" class="danger" data-delete="meals:${r.id}">Удалить</button>
        </div>
        <div class="chips">
          ${r.grams?`<span class="chip">${escapeHtml(r.grams)} г</span>`:''}
          ${r.protein?`<span class="chip">Б: ${escapeHtml(r.protein)}</span>`:''}
          ${r.fat?`<span class="chip">Ж: ${escapeHtml(r.fat)}</span>`:''}
          ${r.carbs?`<span class="chip">У: ${escapeHtml(r.carbs)}</span>`:''}
        </div>
      </div>`).join('') : '<div class="empty">Пока нет записей по еде.</div>'}
    </div>
  </section>`;
}
function renderSymptoms(){
  const rows = [...state.symptoms].sort((a,b)=>b.date.localeCompare(a.date));
  return `<section class="card section">
    <h2>Самочувствие</h2>
    <p class="desc">Краткая фиксация жалоб без сложной медицинской терминологии.</p>
    <form id="symptomForm" class="form-grid two">
      <div class="field"><label>Дата</label><input type="date" name="date" value="${today()}"></div>
      <div class="field"><label>Симптом</label><input name="symptom" placeholder="например одышка"></div>
      <div class="field"><label>Сила 0–10</label><input name="severity"></div>
      <div class="field"><label>Длительность</label><input name="duration"></div>
      <div class="field"><label>Триггер</label><input name="trigger"></div>
      <div class="field" style="grid-column:1/-1"><label>Комментарий</label><textarea name="notes"></textarea></div>
      <div class="actions"><button class="primary" type="submit">Сохранить симптом</button></div>
    </form>
    <div class="list">
      ${rows.length ? rows.map(r=>`<div class="entry">
        <div class="entry-head">
          <div>
            <div class="entry-title">${escapeHtml(r.symptom||'Симптом')} · ${escapeHtml(r.severity||'—')}/10</div>
            <div class="entry-meta">${escapeHtml(r.date||'')} · ${escapeHtml(r.duration||'')}</div>
          </div>

function getDateMinusDays(days){
  const d = new Date();
  d.setDate(d.getDate() - days + 1);
  return d.toISOString().slice(0,10);
}
function getReportRangeDays(days=14){
  const start = getDateMinusDays(days);
  const map = {};
  for(let i=0;i<days;i++){
    const d = new Date(start);
    d.setDate(d.getDate()+i);
    const key = d.toISOString().slice(0,10);
    map[key] = {date:key, pressure:[], sleep:[], meals:[], symptoms:[]};
  }
  state.pressure.forEach(x=>{ if(map[x.date]) map[x.date].pressure.push(x); });
  state.sleep.forEach(x=>{ if(map[x.date]) map[x.date].sleep.push(x); });
  state.meals.forEach(x=>{ if(map[x.date]) map[x.date].meals.push(x); });
  state.symptoms.forEach(x=>{ if(map[x.date]) map[x.date].symptoms.push(x); });
  return Object.values(map).sort((a,b)=>b.date.localeCompare(a.date));
}
function partOfDay(time=''){
  const h = Number(String(time).slice(0,2));
  if(Number.isNaN(h)) return 'без времени';
  if(h < 12) return 'утро';
  if(h < 18) return 'день';
  return 'вечер';
}
function pressureLine(p){
  const sys = Number(p.sys||0), dia = Number(p.dia||0);
  const mark = (sys>=160 || dia>=100) ? 'bad' : ((sys>=140 || dia>=90) ? 'flag' : '');
  return `<div class="${mark}">${escapeHtml(p.time||'--:--')} (${partOfDay(p.time)}): ${escapeHtml(p.sys||'—')}/${escapeHtml(p.dia||'—')}, пульс ${escapeHtml(p.pulse||'—')}${p.meds?`, лекарства: ${escapeHtml(p.meds)}`:''}${p.notes?`<br><span class="report-small">${escapeHtml(p.notes)}</span>`:''}</div>`;
}
function sleepLine(s){
  return `<div>${escapeHtml(s.bedTime||'—')} → ${escapeHtml(s.wakeTime||'—')}; сонливость ${escapeHtml(s.daySleepiness||'—')}/10; храп: ${escapeHtml(s.snoring||'—')}; сухость: ${escapeHtml(s.dryMouth||'—')}${s.notes?`<br><span class="report-small">${escapeHtml(s.notes)}</span>`:''}</div>`;
}
function mealLine(m){
  return `<div>${escapeHtml(m.meal||'')}: ${escapeHtml(m.product||'—')} ${m.grams?`(${escapeHtml(m.grams)} г)`:''}; ${calcMealCalories(m)} ккал${m.notes?`<br><span class="report-small">${escapeHtml(m.notes)}</span>`:''}</div>`;
}
function symptomLine(s){
  return `<div>${escapeHtml(s.symptom||'—')}; сила ${escapeHtml(s.severity||'—')}/10; ${escapeHtml(s.duration||'')}${s.trigger?`; триггер: ${escapeHtml(s.trigger)}`:''}${s.notes?`<br><span class="report-small">${escapeHtml(s.notes)}</span>`:''}</div>`;
}
function reportSummary(days){
  const allP = days.flatMap(d=>d.pressure);
  const morningP = allP.filter(p=>partOfDay(p.time)==='утро');
  const eveningP = allP.filter(p=>partOfDay(p.time)==='вечер');
  const high = allP.filter(p=>Number(p.sys)>=140 || Number(p.dia)>=90);
  const veryHigh = allP.filter(p=>Number(p.sys)>=160 || Number(p.dia)>=100);
  const sleepy = days.flatMap(d=>d.sleep).filter(s=>Number(s.daySleepiness||0)>=7);
  const symptoms = days.flatMap(d=>d.symptoms);
  return {allP, morningP, eveningP, high, veryHigh, sleepy, symptoms};
}

          <div class="report-block"><b>Сон / сонливость</b>${d.sleep.length ? d.sleep.map(sleepLine).join('') : '<span class="report-small">Нет записей сна</span>'}</div>
          <div class="report-block"><b>Самочувствие</b>${d.symptoms.length ? d.symptoms.map(symptomLine).join('') : '<span class="report-small">Нет жалоб</span>'}</div>

function buildDoctorCsv(){
  const days = getReportRangeDays(14);
  const rows = [['date','period','time','sys','dia','pulse','meds','pressure_notes','sleepiness','snoring','dry_mouth','symptoms','meals_kcal','meals']];
  days.slice().reverse().forEach(d=>{
    const pressures = d.pressure.length ? d.pressure : [{}];
    pressures.forEach(p=>{
      rows.push([
        d.date,
        p.time ? partOfDay(p.time) : '',
        p.time || '',
        p.sys || '',
        p.dia || '',
        p.pulse || '',
        p.meds || '',
        p.notes || '',
        d.sleep.map(s=>s.daySleepiness||'').filter(Boolean).join('; '),
        d.sleep.map(s=>s.snoring||'').filter(Boolean).join('; '),
        d.sleep.map(s=>s.dryMouth||'').filter(Boolean).join('; '),
        d.symptoms.map(s=>`${s.symptom||''} ${s.severity?`(${s.severity}/10)`:''}`).join('; '),
        d.meals.reduce((a,m)=>a+calcMealCalories(m),0) || '',
        d.meals.map(m=>`${m.meal||''}: ${m.product||''}`).join('; ')
      ]);
    });
  });
  return rows.map(r=>r.map(v=>`"${String(v).replaceAll('"','""')}"`).join(',')).join('\\n');
}
function downloadTextFile(filename, text, type='text/plain'){

  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function wireDynamic(){
  document.querySelectorAll('[data-screen]').forEach(btn=>{
    btn.onclick = (e)=>{
      e.preventDefault();
      if(state.mode === 'denis'){
        setState(s=>{s.denisScreen = btn.dataset.screen; return s;});
      }else{
        setState(s=>{s.analystScreen = btn.dataset.screen; return s;});
      }
    };
  });

  bindForm('pressureForm', values => setState(s=>{ s.pressure.unshift({id:uid(), ...values}); return s; }));
  bindForm('sleepForm', values => setState(s=>{ s.sleep.unshift({id:uid(), ...values}); return s; }));
  bindForm('mealForm', values => setState(s=>{ s.meals.unshift({id:uid(), ...values}); return s; }));
  bindForm('symptomForm', values => setState(s=>{ s.symptoms.unshift({id:uid(), ...values}); return s; }));
  bindForm('profileForm', values => setState(s=>{ s.profile = values; return s; }));
  bindForm('cfgForm', values => {
    supabase = null;
    setCfg(values);
    syncMessage = 'Ключи сохранены. Теперь можно отправить ссылку входа на email.';
  });

  document.querySelectorAll('[data-delete]').forEach(btn=>{
    btn.onclick = ()=>{
      const [section,id] = btn.dataset.delete.split(':');
      setState(s=>{ s[section] = s[section].filter(x=>x.id!==id); return s; });
    };
  });

  const sendMagicBtn = document.getElementById('sendMagicBtn');
  if(sendMagicBtn) sendMagicBtn.onclick = sendMagicLink;

  const checkSessionBtn = document.getElementById('checkSessionBtn');
  if(checkSessionBtn) checkSessionBtn.onclick = async ()=>{
    await refreshSession();
    syncMessage = sessionEmail ? 'Вход подтверждён.' : 'Сессия пока не найдена. Открой письмо и перейди по ссылке.';
    render();
  };

  const saveCloudBtn = document.getElementById('saveCloudBtn');
  if(saveCloudBtn) saveCloudBtn.onclick = saveCloud;

  const loadCloudBtn = document.getElementById('loadCloudBtn');
  if(loadCloudBtn) loadCloudBtn.onclick = loadCloud;

  const reportBtn = document.getElementById('downloadDoctorReportBtn');
  if(reportBtn) reportBtn.onclick = () => downloadTextFile('denis-health-report-14-days.html', buildDoctorReportHtml(), 'text/html');

  const csvBtn = document.getElementById('downloadDoctorCsvBtn');
  if(csvBtn) csvBtn.onclick = () => downloadTextFile('denis-health-report-14-days.csv', buildDoctorCsv(), 'text/csv;charset=utf-8');
}
function bindForm(id, handler){
  const form = document.getElementById(id);
  if(!form) return;
  form.onsubmit = (e)=>{
    e.preventDefault();
    const values = Object.fromEntries(new FormData(form).entries());
    handler(values);
    form.reset();
    if(id === 'pressureForm'){ form.date.value = today(); form.time.value = nowTime(); }
    if(id === 'sleepForm'){ form.date.value = today(); form.bedTime.value = '22:30'; form.wakeTime.value = '07:00'; }
    if(id === 'mealForm'){ form.date.value = today(); }
    if(id === 'symptomForm'){ form.date.value = today(); }
  };
}

async function sendMagicLink(){
  const client = ensureClient();
  if(!client || !cfg.email){
    syncMessage = 'Сначала заполни ключи и email.';
    render();
    return;
  }
  const { error } = await client.auth.signInWithOtp({ email: cfg.email });
  syncMessage = error ? `Ошибка: ${error.message}` : 'Письмо со ссылкой входа отправлено.';
  render();
}

async function saveCloud(){
  const client = ensureClient();
  if(!client || !cfg.roomCode){
    syncMessage = 'Сначала сохрани ключи и room code.';
    render();
    return;
  }
  const { data } = await client.auth.getSession();
  if(!data.session?.user){
    syncMessage = 'Сначала войди по email.';
    render();
    return;
  }
  const payload = {
    room_code: cfg.roomCode,
    payload: state,
    updated_at: new Date().toISOString()
  };
  const { error } = await client.from('health_data').upsert(payload, { onConflict:'room_code' });
  syncMessage = error ? `Ошибка сохранения: ${error.message}` : 'Данные сохранены в облако.';
  render();
}

async function loadCloud(){
  const client = ensureClient();
  if(!client || !cfg.roomCode){
    syncMessage = 'Сначала сохрани ключи и room code.';
    render();
    return;
  }
  const { data, error } = await client.from('health_data').select('payload').eq('room_code', cfg.roomCode).limit(1);
  if(error){
    syncMessage = `Ошибка загрузки: ${error.message}`;
    render();
    return;
  }
  if(!data || !data.length){
    syncMessage = 'В облаке пока нет данных. Сначала нажми "Сохранить в облако".';
    render();
    return;
  }
  state = { ...structuredClone(defaultData), ...data[0].payload };
  saveAll();
  syncMessage = 'Данные загружены из облака.';
  render();
}

document.querySelectorAll('[data-mode]').forEach(btn=>{
  btn.onclick = (e)=>{
    e.preventDefault();
    setState(s=>{ s.mode = btn.dataset.mode; return s; });
  };
});

document.getElementById('exportBtn').onclick = ()=>{
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'denis-health-data.json';
  a.click();
  URL.revokeObjectURL(url);
};
document.getElementById('importBtn').onclick = ()=> document.getElementById('importFile').click();
document.getElementById('importFile').onchange = async ()=>{
  const f = document.getElementById('importFile').files[0];
  if(!f) return;
  try{
    state = { ...structuredClone(defaultData), ...JSON.parse(await f.text()) };
    saveAll();
    syncMessage = 'Данные импортированы.';
    render();
  }catch(e){
    alert('Не удалось импортировать файл.');
  }
  document.getElementById('importFile').value = '';
};
document.getElementById('resetBtn').onclick = ()=>{
  if(!confirm('Удалить все локальные данные приложения на этом устройстве?')) return;
  state = structuredClone(defaultData);
  saveAll();
  syncMessage = 'Локальные данные сброшены.';
  render();
};

let deferredPrompt = null;
const installBtn = document.getElementById('installBtn');
window.addEventListener('beforeinstallprompt', (e)=>{
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display = 'inline-flex';
});
installBtn.onclick = async ()=>{
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  await deferredPrompt.userChoice;
  deferredPrompt = null;
  installBtn.style.display = 'none';
};
window.addEventListener('appinstalled', ()=> installBtn.style.display = 'none');

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=> navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}

refreshSession();
render();
